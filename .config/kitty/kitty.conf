# Kitty Configuration

# Remote Control
allow_remote_control yes
listen_on unix:/tmp/mykitty

# Shell
# shell /opt/homebrew/bin/tmux

# Font
font_family      Hack
font_size        14.0

# Scrollback
scrollback_lines 100000

# Window
hide_window_decorations titlebar-only
macos_titlebar_color background
confirm_os_window_close 0
window_padding_width 10

# Tab Bar
tab_bar_edge top
tab_bar_style custom
tab_bar_min_tabs 1
tab_bar_margin_height 5.0 5.0
tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title}"
active_tab_foreground   #1c1c1c
active_tab_background   #709772
active_tab_font_style   bold
inactive_tab_foreground #7f7f7f
inactive_tab_background #252525
inactive_tab_font_style normal
tab_bar_background      #252525
tab_bar_margin_color    #252525

# Background Opacity
background_opacity 0.75
dynamic_background_opacity yes

# Selection
copy_on_select yes
strip_trailing_spaces smart

# Theme
include dark-theme.auto.conf
