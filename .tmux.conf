# ----------------------------------------------------------------------
# | Base Settings                                                      |
# ----------------------------------------------------------------------

set -g default-shell /bin/zsh

# Set prefix to Ctrl+Space
unbind C-a
set -g prefix C-Space
bind C-Space send-prefix

# Reload Config Keybind

## Unbind the default binding for r (which is usually 'refresh-client')
unbind r

## Bind r to reload the tmux config file
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Set Mouse
set-option -g mouse on

# Extensive History
set-option -g history-limit 100000

# Window & Pane Numbering

## Start window numbering from 1
set-option -g base-index 1

## Renumber windows when one is closed
set-option -g renumber-windows on

## Start pane numbering from 1
set-option -g pane-base-index 1

## Create new window after the current one
bind c new-window -a

# Set pane title

# Active pane app is the title we display
set-option -g set-titles on
set-option -g set-titles-string "#{pane_title}"

# Split From Current Path

## Vertical
bind '"' split-window -c "#{pane_current_path}"

## Horizontal
bind % split-window -h -c "#{pane_current_path}"

# Server Options
set-option -s set-clipboard on
set-option -s focus-events on
set-option -s extended-keys on
set-option -s escape-time 0

# ----------------------------------------------------------------------
# | Status bar                                                         |
# ----------------------------------------------------------------------

RED="#AF5F5F"
GREEN="#5F875F"
YELLOW="#FF8700"
BLUE="#5F87AF"
MAGENTA="#5F5F87"
CYAN="#5F8787"
BLACK="#1C1C1C"
DARK_GRAY="#262626"
LIGHT_GRAY="#6C6C6C"

# Notified when something happens in one of the other windows
setw -g monitor-activity on
set -g visual-activity on

# Periodically refresh the status bar
set -g status-interval 60

# Basic colors of the Statusbar
set-option -g status-style bg=${BLACK},fg=${LIGHT_GRAY}

# Customize what is displayed
set -g status-justify left
set -g status-left-length 50
set -g status-left " #S / "
#                     └─ current session name
set -g status-right " %R "
#                     └─ current time

# Nerdfont characters for separators
SOLID_BLOCK="#(printf '\u2588')"

# Set the separator between windows to be empty
setw -g window-status-separator ""

# Default window format
setw -g window-status-format "#{?window_activity_flag,#[fg=${LIGHT_GRAY} bg=${LIGHT_GRAY}]${SOLID_BLOCK}${SOLID_BLOCK}${SOLID_BLOCK}#[bg=${LIGHT_GRAY} fg=${DARK_GRAY}]#I:#W#[fg=${LIGHT_GRAY} bg=${LIGHT_GRAY}]${SOLID_BLOCK}${SOLID_BLOCK}${SOLID_BLOCK},#[fg=${BLACK} bg=${BLACK}]${SOLID_BLOCK}${SOLID_BLOCK}${SOLID_BLOCK}#[default]#I:#W#[fg=${BLACK} bg=${BLACK}]${SOLID_BLOCK}${SOLID_BLOCK}${SOLID_BLOCK}}"

# Set True Color
#set-option -sa terminal-overrides ",xterm*:Tc"
set-option -ga terminal-overrides ",xterm-256color:Tc"
set -g default-terminal "screen-256color"




# ----------------------------------------------------------------------
# | Visual Tweaks (Apprentice Integration)                             |
# ----------------------------------------------------------------------

# Pane borders
set -g pane-border-style fg=${DARK_GRAY}
set -g pane-active-border-style fg=${BLUE}

# Selection mode (Copy mode) colors
set -g mode-style bg=${BLUE},fg=${BLACK}

# Command prompt and message colors
set -g message-style bg=${BLACK},fg=${BLUE}

# Active window status in the status bar
setw -g window-status-current-style bg=${BLUE},fg=${BLACK},bold
setw -g window-status-current-format "#[fg=${BLUE} bg=${BLUE}]${SOLID_BLOCK}${SOLID_BLOCK}${SOLID_BLOCK}#[bg=${BLUE} fg=${BLACK}]#I:#W#[fg=${BLUE} bg=${BLUE}]${SOLID_BLOCK}${SOLID_BLOCK}${SOLID_BLOCK}"

# Window with activity style
setw -g window-status-activity-style bg=${LIGHT_GRAY},fg=${DARK_GRAY}

